      <h2>Procedural World Generation</h2>
      <p>Far Cry 6's Yara is a massive open world spanning jungles, beaches, cliffs, and volcanic terrain. I built the procedural pipeline that scatters foliage, generates road and river networks, and blends materials to keep the world believable at AAA scale.</p>
