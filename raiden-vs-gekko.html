      <p>This project explores a real-time cinematic combat sequence inspired by Raiden versus Gekko, with focus on production-friendly rig controls and animation readability.</p>
      <h3>Research Pipeline</h3>
      <p>I developed the rig in Blender, imported assets into Unreal Engine 5, and iterated animation timing, pose readability, and camera rhythm using Sequencer and Control Rig.</p>

      <p>The final sequence improved impact timing and character silhouette clarity while reducing iteration friction through a cleaner rig-to-engine workflow.</p>
