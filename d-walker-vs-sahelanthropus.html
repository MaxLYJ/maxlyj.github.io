      <section class="project-noscript__details">
      <h3>Initiative</h3>
      <p>Ten years ago (2015), I experienced one of the most unforgettable moments in gaming: the battle against Sahelanthropus in Metal Gear Solid V: The Phantom Pain. That rush and momentum stayed with me ever since. Over the years, I kept asking myself, &quot;What took you so long?&quot; The answer is simple: I wanted to return to this moment with the skills, experience, and knowledge I gained through a decade of work as a technical artist in the game industry.

Now, on the 10th anniversary of MGSV, I am bringing that memory back to life through my own recreation, a tribute to a true video game legend.

I hope you enjoy it.</p>
      <p class="project-noscript__video">Video: <a href="https://youtu.be/Go_2zuEATvg">D-Walker VS Sahelanthropus video</a></p>
